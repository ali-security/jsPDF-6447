name: Continous Integration

on: [push, pull_request,workflow_dispatch]

jobs:
  test-browser:
    name: Browser tests
    runs-on: ubuntu-22.04 # Pinned to an older OS for better Node 14 compatibility
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev xvfb \
            libdbus-glib-1-2 libgtk-3-0 libasound2 libx11-xcb1 libxt6

      - name: Install Firefox (non-snap)
        run: |
          # Ubuntu 22.04's apt `firefox` package is a transitional shim that
          # installs the Snap build, which does not run in GitHub Actions
          # runners and causes karma-firefox-launcher to hit its capture
          # timeout. Install Mozilla's official Firefox tarball instead.
          set -euo pipefail
          FIREFOX_VERSION="${FIREFOX_VERSION:-115.0esr}"
          curl -fsSL -o /tmp/firefox.tar.bz2 \
            "https://ftp.mozilla.org/pub/firefox/releases/${FIREFOX_VERSION}/linux-x86_64/en-US/firefox-${FIREFOX_VERSION}.tar.bz2"
          sudo rm -rf /opt/firefox
          sudo tar -xjf /tmp/firefox.tar.bz2 -C /opt
          sudo ln -sf /opt/firefox/firefox /usr/local/bin/firefox
          /usr/local/bin/firefox --version
          echo "FIREFOX_BIN=/usr/local/bin/firefox" >> "$GITHUB_ENV"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
          
      - name: npm install
        run: npm ci
      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jspdf-2.5.1.tgz
          path: jspdf-2.5.1.tgz

      - name: Run tests
        run: npm run test-ci

      - name: Run deployment tests (AMD)
        run: xvfb-run --auto-servernum npm run test-amd

      - name: Run deployment tests (ESM)
        run: xvfb-run --auto-servernum npm run test-esm

      - name: Run deployment tests (globals)
        run: xvfb-run --auto-servernum npm run test-globals

      - name: Run deployment tests (TypeScript)
        run: xvfb-run --auto-servernum npm run test-typescript

      - name: Run deployment tests (WebWorker)
        run: xvfb-run --auto-servernum npm run test-webworker

  test-node:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        node-version:
          - 10 # minimum supported version
          - 14 # current LTS
          - 16 # latest
    name: Node.js ${{ matrix.node-version }} test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: npm install
        run: npm install
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm run test-node

  test-typings:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ts-version:
          - '3.0'
          - '4.0'
          - 'latest'
    name: Typings tests (typescript@${{ matrix.ts-version }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
      - name: npm install
        run: npm install
      - name: Install typescript@${{ matrix.ts-version }}
        run: |
          npm install typescript@${{ matrix.ts-version }}
          # fix: if latest, also install matching node types
          if [ "${{ matrix.ts-version }}" = "latest" ]; then
            npm install @types/node@latest
          fi
      - name: Run tests
        run: npm run test-typings

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
      - name: npm install
        run: npm install

